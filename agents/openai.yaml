interface:
  display_name: GG → Specs → Developer Briefs
  short_description: Create investigation-ready specs in .specs linking behavior to source entry points
  icon_small: ./assets/icon-small.svg
  icon_large: ./assets/icon-large.png
  brand_color: '#22C55E'
  default_prompt: >-
    Create investigation-ready spec files under .specs that link observed behavior to source code
    entry points. Bridge runbook findings, study outputs, or audit results into actionable developer
    briefs with user journeys and key files tables. Reference
    specs/SKILL.md when cross-referencing this skill.
